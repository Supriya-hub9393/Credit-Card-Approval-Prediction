<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <h1>💳 Automated Credit Card Eligibility Portal</h1>
            <p>Real-time banking underwriting powered by ML Pipelines.</p>
        </header>
        <main class="form-container">
            <form action="/predict" method="POST">
                <div class="input-grid">
                    <div class="input-group"><label for="annual_income">Annual Income ($)</label><input type="number" id="annual_income" name="annual_income" required min="0"></div>
                    <div class="input-group"><label for="employment_duration">Employment Duration (Years)</label><input type="number" step="0.1" id="employment_duration" name="employment_duration" required min="0"></div>
                    <div class="input-group"><label for="gender">Applicant Gender</label><select id="gender" name="gender"><option value="0">Female</option><option value="1">Male</option></select></div>
                    <div class="input-group"><label for="education_level">Education Qualification</label><select id="education_level" name="education_level"><option value="0">Secondary</option><option value="1">Higher Ed</option></select></div>
                    <div class="input-group"><label for="income_type">Income Category Type</label><select id="income_type" name="income_type"><option value="0">Working</option><option value="1">Commercial</option></select></div>
                    <div class="input-group"><label for="past_due_status">Past Due Status Scale</label><select id="past_due_status" name="past_due_status"><option value="0">Clean</option><option value="1">1-29 days</option><option value="2">30-59 days</option><option value="3">60+ days</option></select></div>
                </div>
                <button type="submit" class="submit-btn">Run Screening Engine</button>
            </form>
            {% if prediction_text %}
            <div class="result-banner {{ alert_class }}"><h3>Underwriting Output:</h3><p>{{ prediction_text }}</p></div>
            {% endif %}
        </main>
    </div>
</body>
</html>
